[project]
name = "klerk"
version = "0.0.1"
description = "Multi-agent Document Intelligence Assistant — hybrid retrieval, knowledge-graph, adversarial proposal pipeline."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "yohn-maistre" }]
license = { text = "MIT" }
keywords = ["rag", "agents", "document-intelligence", "nemotron", "mcp", "bahasa"]

dependencies = [
    # LLM gateway + caching
    "litellm>=1.50.0",
    "diskcache>=5.6.3",
    "pydantic-ai>=0.0.20",
    "pydantic>=2.9",

    # Retrieval stack
    "lancedb>=0.13.0",
    "tantivy>=0.22.0",
    "sentence-transformers>=3.2.0",          # BGE-M3 + BGE-Reranker-v2-m3
    "torch>=2.4.0",
    "transformers>=4.45.0",

    # Knowledge graph
    "networkx>=3.3",

    # Parsing
    "docling>=2.5.0",
    "pymupdf>=1.24.0",

    # Synthesis
    "reportlab>=4.2.0",
    "python-docx>=1.1.0",
    "faker>=30.0.0",

    # Drive (optional path)
    "google-api-python-client>=2.148.0",
    "google-auth>=2.35.0",
    "google-auth-oauthlib>=1.2.0",

    # Eval
    "ragas>=0.2.0",
    "datasets>=3.0.0",

    # Observability
    "arize-phoenix>=5.0.0",
    "openinference-instrumentation-litellm>=0.1.0",
    "opentelemetry-sdk>=1.27.0",

    # Background ingestion (SHOULD)
    "apscheduler>=3.10.4",
    "watchdog>=5.0.3",

    # CLI + Studio
    "typer>=0.12.5",
    "rich>=13.9.0",
    "textual>=0.83.0",

    # MCP
    "mcp>=1.0.0",

    # FastAPI web hook (STRETCH)
    "fastapi>=0.115.0",
    "sse-starlette>=2.1.3",
    "uvicorn>=0.32.0",

    # YAML for golden sets
    "pyyaml>=6.0.2",
]

[project.scripts]
klerk = "klerk.cli.main:app"
klerk-mcp = "klerk.mcp.server:main"
klerk-studio = "klerk.studio.app:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.7.0",
    "mypy>=1.13.0",
]
# STRETCH note: textual-web pins old textual (<0.44) which conflicts with
# our textual>=0.83. If we reach STRETCH (browser deploy of studio), install
# textual-web in a separate venv and run it against the studio over the wire.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/klerk"]

[tool.uv]
package = true

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
